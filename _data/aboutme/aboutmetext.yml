- top: ''
  lvlone: "I graduated from the University of Lethbridge in May 2026 with a Bachelor of Science in Physics. I was always interested in the sciences, but I fell in love with astronomy after visiting the Cypress Hills Observatory in middle school, and chose to complete a physics degree as a route to later pursuing astrophysics. During my time as an undergraduate student I was awarded research opportunities that revealed my passion for astrophysics research, but these grew my list of research interests rather than narrowing them down. I am currently open to all research topics, but I have some experience studying radio astronomy and X-ray binaries from my internships."
  pic: "auroraheart_short.jpg"
  picformatting: "100%"

- top: ''
  lvlone: "I strongly believe that science should be accessible to the public and that science communication is a necessary skill for all researchers. I also believe that nurturing scientific curiosity in students, especially those from underrepresented backgrounds, is absolutely essential. My journies through both life and academia have been strongly influenced by the guidance and support of many inspiring women. I understand that this same inspiration and empowerment are both important to both bringing young girls into the sciences, and to keeping them from leaving. Because of this, I am greatly interested in outreach efforts that support women and girls in STEM."
  pic: "outreach.jpg"
  picformatting: "100%"

- top: ''
  lvlone: 'Outside of school and work, I keep myself busy by baking treats to share with friends, briefly obessing over crochet projects, or adding to my eclectic CD collection. I also love to read fantasy and sci-fi for fun, and spend time under the sun. While I enjoy playing party and board games with friends, I seem to lose every time, so feel free to challenge me to a game!'
  pic: "honse.jpg"
  picformatting: "100%"