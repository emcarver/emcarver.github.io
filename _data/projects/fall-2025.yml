- title: 'Disentangling Multiwavelength Emission from X-ray Binaries Through Colour-Magnitude Diagram Modelling'
  description: 'Black hole X-ray binaries within our galaxy are systems that contain a stellar mass black hole and companion star that accretes matter onto the black hole, forming an accretion disc. These systems can go into phases of outburst, where they launch relativistic jets and brighten across the electromagnetic spectrum. The emission from these systems at optical wavelengths is particularly complex, as both thermal emission from the disc and non-thermal emission from the jet contribute to the overall optical flux. While large multiwavelength observing campaigns are able to determine jet characteristics, these observations are difficult to execute. Previous efforts to observe these X-ray binaries in outburst have resulted in a large archive of optical/infrared observations from telescopes in the Las Cumbres Observatory Network, and optical/UV observations from the Neil Gehrels Swift Observatory. Using this data, we demonstrate a method in which only two simultaneously observed filters are required to separate the complex emission mechanisms, using colour-magnitude diagrams and physically motivated models. I designed, implemented, and tested the code used to process the data into colour-magnitude diagrams, flag diagrams satisfactory or unsatisfactory for further fitting, to conduct the fittings, and to visualize the results. The below diagram shows a collection of model tracks that may be traced on a colour-magnitude diagram by the same X-ray binary in outburst, for different jet power-law indices. This index allows the components of flux at a given frequency due to the jet and disc to be determined and thus the different mechanisms of emission are separated. While my work focused on the implementation of these methods, the project is ongoing, with future goals of expanding the techniques to the entire data archive, determining which combinations of filters are show the most scientifically useful results, and refining the model and fitted parameter uncertainty estimation. Working on this project as part of my independent study allowed me to gain a better understanding of X-ray binaries as multiwavelength objects, to continue to strengthen my coding skills, and to continue practicing science communication through collaboration.  '
